<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Kitchen AI</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle, #0f172a, #020617);
    color:white;
}

/* NAV */
nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

nav a{
    color:white;
    margin:0 10px;
    text-decoration:none;
}
nav a:hover{color:#38bdf8}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:40px;
    color:#38bdf8;
}

.btn{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:#38bdf8;
    cursor:pointer;
    border-radius:10px;
    font-weight:bold;
}

/* PRODUCTS */
#products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

.product{
    padding:10px 15px;
    background:rgba(255,255,255,0.08);
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.product:hover{
    transform:scale(1.05);
}

.selected{
    background:#38bdf8;
    color:black;
}

/* SECTION */
section{
    padding:80px 20px;
    text-align:center;
}

#result{
    margin-top:20px;
    padding:15px;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
}

/* CONTACT */
.contact{
    background:#111827;
}

footer{
    text-align:center;
    padding:20px;
    background:black;
}
</style>
</head>

<body>

<nav>
    <div><b>Smart Kitchen AI</b></div>
    <div>
        <a href="#home">Home</a>
        <a href="#recipe">Recipe</a>
        <a href="#contact">Aloqa</a>
    </div>
</nav>

<div class="hero" id="home">
    <h1>🍲 Smart Kitchen AI</h1>
    <p>Uyda bor mahsulotlardan avtomatik retsept topadi</p>
</div>

<section id="recipe">

<h2>Mahsulotlarni tanla</h2>

<div id="products"></div>

<br>

<button class="btn" onclick="findRecipe()">🔍 Retsept topish</button>
<button class="btn" onclick="fast()">⚡ 15 min</button>
<button class="btn" onclick="diet()">🥗 Parhez</button>
<button class="btn" onclick="random()">🎲 Random</button>

<div id="result">Natija shu yerda chiqadi</div>

</section>

<section id="contact" class="contact">
<h2>Aloqa</h2>
<p>Email: example@gmail.com</p>
<p>Telegram: @bahodirjon</p>
</section>

<footer>© 2026 Smart Kitchen AI</footer>

<script>

// PRODUCTS
let products = ["Go'sht","Kartoshka","Sabzi","Piyoz","Pomidor","Tuxum","Guruch"];

// RECIPES
let recipes = [
{name:"Kartoshkali omlet",items:["Kartoshka","Tuxum"],time:10,diet:true},
{name:"Qovurilgan kartoshka",items:["Kartoshka","Piyoz"],time:15,diet:true},
{name:"Go'shtli guruch",items:["Go'sht","Guruch","Sabzi"],time:30,diet:false},
{name:"Sabzavot salat",items:["Pomidor","Sabzi","Piyoz"],time:10,diet:true}
];

let selected = [];
let popularity = JSON.parse(localStorage.getItem("pop")||"{}");

// RENDER PRODUCTS
function render(){
let box = document.getElementById("products");
box.innerHTML="";

products
.sort((a,b)=>(popularity[b]||0)-(popularity[a]||0))
.forEach(p=>{

let div=document.createElement("div");
div.className="product";

if(selected.includes(p)) div.classList.add("selected");

div.innerText=p;

div.onclick=()=>{

if(selected.includes(p)){
selected = selected.filter(x=>x!==p);
}else{
selected.push(p);
popularity[p]=(popularity[p]||0)+1;
localStorage.setItem("pop",JSON.stringify(popularity));
}

render();
}

box.appendChild(div);
});
}

// FIND
function findRecipe(){
let res = recipes.filter(r =>
selected.every(i=>r.items.includes(i))
);

show(res);
}

// FILTERS
function fast(){
show(recipes.filter(r=>r.time<=15));
}

function diet(){
show(recipes.filter(r=>r.diet));
}

function random(){
let r = recipes[Math.floor(Math.random()*recipes.length)];
document.getElementById("result").innerHTML=
`<h3>${r.name}</h3>`;
}

function show(list){
document.getElementById("result").innerHTML=
list.length?
list.map(r=>`<h3>${r.name}</h3>`).join("")
:"❌ topilmadi";
}

render();

</script>

</body>
</html>
