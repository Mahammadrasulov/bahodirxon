<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Recipe Finder</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{color:#38bdf8;}

.container{
    max-width:900px;
    margin:auto;
}

/* PRODUCTS */
#products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

.product{
    padding:10px 15px;
    background:rgba(255,255,255,0.1);
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
    user-select:none;
}

.product:hover{
    transform:scale(1.05);
}

.selected{
    background:#38bdf8;
    color:black;
}

/* BUTTONS */
button{
    margin:10px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

#find{
    background:#22c55e;
}

#random{
    background:#f97316;
}

.filter{
    background:#64748b;
}

/* RESULT */
#result{
    margin-top:20px;
    padding:15px;
    background:rgba(255,255,255,0.08);
    border-radius:10px;
    min-height:100px;
}

/* POPULAR */
#popular{
    margin-top:20px;
    font-size:14px;
    color:#cbd5e1;
}
</style>
</head>

<body>

<h1>🍲 Smart Recipe Finder</h1>
<p>Uyda bor mahsulotlarni tanla va retsept ol</p>

<div class="container">

<!-- PRODUCTS -->
<div id="products"></div>

<!-- BUTTONS -->
<div>
    <button id="find">🔍 Retsept topish</button>
    <button id="random">🎲 Tasodifiy taom</button>
    <button class="filter" onclick="filterFast()">⚡ 15 min</button>
    <button class="filter" onclick="filterDiet()">🥗 Parhez</button>
    <button class="filter" onclick="resetFilter()">🔄 Reset</button>
</div>

<!-- RESULT -->
<div id="result">Natija shu yerda chiqadi...</div>

<!-- POPULAR -->
<div id="popular">Eng ko‘p tanlangan mahsulotlar shu yerda chiqadi</div>

</div>

<script>
// PRODUCTS
let products = ["Go'sht","Kartoshka","Sabzi","Piyoz","Pomidor","Tuxum","Guruch","Makaron","Un","Sut"];

// RECIPES DATABASE
let recipes = [
{
name:"Qovurilgan kartoshka",
items:["Kartoshka","Piyoz"],
time:15,
diet:true,
desc:"Kartoshkani to‘g‘rab qovuriladi, piyoz qo‘shiladi."
},
{
name:"Kartoshkali omlet",
items:["Kartoshka","Tuxum"],
time:10,
diet:true,
desc:"Tuxum va kartoshka aralashtirib qovuriladi."
},
{
name:"Makaron go‘sht bilan",
items:["Makaron","Go'sht","Piyoz"],
time:25,
diet:false,
desc:"Go‘sht va piyoz qovurilib, makaron bilan aralashtiriladi."
},
{
name:"Sabzavotli salat",
items:["Pomidor","Sabzi","Piyoz"],
time:10,
diet:true,
desc:"Barcha sabzavotlar to‘g‘raladi va aralashtiriladi."
},
{
name:"Guruchli ovqat",
items:["Guruch","Go'sht","Sabzi"],
time:30,
diet:false,
desc:"Guruch go‘sht va sabzi bilan pishiriladi."
}
];

// POPULAR STORAGE
let popularity = JSON.parse(localStorage.getItem("pop")) || {};

// CREATE UI
let selected = [];

function renderProducts(){
let container = document.getElementById("products");
container.innerHTML = "";

products
.sort((a,b)=> (popularity[b]||0)-(popularity[a]||0))
.forEach(p=>{
    let div = document.createElement("div");
    div.className = "product";
    div.innerText = p;

    if(selected.includes(p)) div.classList.add("selected");

    div.onclick = ()=>{
        if(selected.includes(p)){
            selected = selected.filter(x=>x!==p);
        }else{
            selected.push(p);
            popularity[p] = (popularity[p]||0)+1;
            localStorage.setItem("pop", JSON.stringify(popularity));
        }
        renderProducts();
        updatePopular();
    };

    container.appendChild(div);
});
}

function findRecipe(list){
let result = recipes.filter(r =>
    list.every(i => r.items.includes(i))
);

if(result.length===0){
document.getElementById("result").innerHTML = "❌ Retsept topilmadi";
return;
}

document.getElementById("result").innerHTML =
result.map(r=>`
<h3>${r.name}</h3>
<p>⏱ ${r.time} daqiqa</p>
<p>${r.desc}</p>
<hr>
`).join("");
}

document.getElementById("find").onclick = ()=>{
findRecipe(selected);
};

document.getElementById("random").onclick = ()=>{
let r = recipes[Math.floor(Math.random()*recipes.length)];
document.getElementById("result").innerHTML =
`<h3>${r.name}</h3><p>${r.desc}</p>`;
};

// FILTERS
function filterFast(){
let fast = recipes.filter(r=>r.time<=15);
document.getElementById("result").innerHTML =
fast.map(r=>`<h3>${r.name}</h3><p>${r.desc}</p>`).join("");
}

function filterDiet(){
let diet = recipes.filter(r=>r.diet);
document.getElementById("result").innerHTML =
diet.map(r=>`<h3>${r.name}</h3><p>${r.desc}</p>`).join("");
}

function resetFilter(){
document.getElementById("result").innerHTML = "Natija shu yerda chiqadi...";
}

// POPULAR DISPLAY
function updatePopular(){
let sorted = Object.entries(popularity)
.sort((a,b)=>b[1]-a[1])
.map(x=>x[0])
.slice(0,5);

document.getElementById("popular").innerHTML =
"🔥 Eng mashhur mahsulotlar: " + sorted.join(", ");
}

// INIT
renderProducts();
updatePopular();
</script>

</body>
</html>
